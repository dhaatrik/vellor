
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vellor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Plus Jakarta Sans', 'sans-serif'],
          },
          colors: {
            primary: {
              light: '#1e293b', // slate-800
              DEFAULT: '#0f172a', // slate-900
              dark: '#020617', // slate-950
            },
            secondary: {
              light: '#ffffff',
              DEFAULT: '#f8fafc', // slate-50
              dark: '#f1f5f9', // slate-100
            },
            accent: {
              light: '#a78bfa', // violet-400
              DEFAULT: '#8b5cf6', // violet-500
              dark: '#7c3aed', // violet-600
            },
            success: '#10b981', // emerald-500
            warning: '#f59e0b', // amber-500
            danger: '#f43f5e', // rose-500
          },
          animation: {
            'fade-in': 'fadeIn 0.3s ease-out',
            'slide-in-up': 'slideInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1)',
            'blob': 'blob 7s infinite',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideInUp: {
              '0%': { transform: 'translateY(20px)', opacity: '0'},
              '100%': { transform: 'translateY(0)', opacity: '1'},
            },
            blob: {
              '0%': { transform: 'translate(0px, 0px) scale(1)' },
              '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
              '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
              '100%': { transform: 'translate(0px, 0px) scale(1)' },
            }
          }
        }
      }
    }
  </script>

<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-secondary dark:bg-primary-dark text-gray-900 dark:text-gray-200 transition-colors duration-300 antialiased selection:bg-accent/30 selection:text-accent-dark dark:selection:text-accent-light">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
