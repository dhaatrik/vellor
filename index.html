
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TutorFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class', // or 'media'
      theme: {
        extend: {
          colors: {
            primary: {
              light: '#404040', // neutral-700 (was blue-400)
              DEFAULT: '#171717', // neutral-900 (was blue-500) - This acts as the "black"
              dark: '#000000', // black (was blue-600)
            },
            secondary: {
              light: '#ffffff', // white (was amber-400)
              DEFAULT: '#f5f5f5', // neutral-100 (was amber-500) - This acts as the "white"
              dark: '#e5e5e5', // neutral-200 (was amber-600)
            },
            success: '#22c55e', // green-500
            warning: '#f97316', // orange-500
            danger: '#ef4444', // red-500
          },
          animation: {
            'fade-in': 'fadeIn 0.5s ease-out',
            'slide-in-up': 'slideInUp 0.5s ease-out',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideInUp: {
              '0%': { transform: 'translateY(20px)', opacity: '0'},
              '100%': { transform: 'translateY(0)', opacity: '1'},
            }
          }
        }
      }
    }
  </script>
<script type="importmap">

}
</script>

</head>

</body>
</html>
